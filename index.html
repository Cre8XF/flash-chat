<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flash — Privat Chat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
</head>
<body>

<!-- AUTH SCREEN -->
<div id="auth-screen">
  <div class="logo">Flash ⚡</div>
  <div class="tagline">Privat. Direkte. Kun dere to.</div>
  <div class="auth-card">
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchTab('login')">Logg inn</button>
      <button class="auth-tab" onclick="switchTab('register')">Registrer</button>
    </div>
    <div id="login-form">
      <div class="field"><label>E-post</label><input type="email" id="login-email" placeholder="deg@eksempel.no" /></div>
      <div class="field"><label>Passord</label><input type="password" id="login-pass" placeholder="••••••••" /></div>
      <button class="btn-primary" onclick="doLogin()">Logg inn</button>
    </div>
    <div id="register-form" style="display:none">
      <div class="field"><label>Visningsnavn</label><input type="text" id="reg-name" placeholder="Ditt navn" /></div>
      <div class="field"><label>E-post</label><input type="email" id="reg-email" placeholder="deg@eksempel.no" /></div>
      <div class="field"><label>Passord</label><input type="password" id="reg-pass" placeholder="Min. 6 tegn" /></div>
      <button class="btn-primary" onclick="doRegister()">Opprett konto</button>
    </div>
    <div id="auth-error" class="auth-error"></div>
  </div>
</div>

<!-- MAIN APP -->
<div id="app">
  <!-- CONTACTS -->
  <div id="contacts-view">
    <div class="top-bar">
      <div class="logo">Flash ⚡</div>
      <div class="user-avatar" id="my-avatar" onclick="showLogout()">?</div>
    </div>
    <div class="search-wrap">
      <input class="search-input" type="text" placeholder="Søk i samtaler..." id="search-input" oninput="filterContacts()" />
    </div>
    <div class="contacts-list" id="contacts-list">
      <div class="empty-contacts">
        <div class="icon">💬</div>
        <p>Ingen samtaler ennå.<br/>Legg til en venn for å starte.</p>
      </div>
    </div>
    <button class="add-contact-btn" onclick="openAddContact()">+ Legg til person via e-post</button>
  </div>

  <!-- CHAT -->
  <div id="chat-view">
    <div class="chat-header">
      <button class="back-btn" onclick="closeChat()">←</button>
      <div class="contact-avatar" id="chat-avatar" style="width:36px;height:36px;font-size:0.85rem;">?</div>
      <div class="chat-header-info">
        <div class="chat-header-name" id="chat-name">—</div>
        <div class="chat-header-status" id="chat-status">● Online</div>
      </div>
    </div>
    <div class="messages-container" id="messages-container"></div>
    <div class="media-preview" id="media-preview">
      <img class="preview-thumb" id="preview-thumb" src="" alt="" />
      <span id="preview-label" style="font-size:0.8rem;color:var(--muted);flex:1">Bilde klar</span>
      <button class="preview-remove" onclick="clearMedia()">✕</button>
    </div>
    <div class="input-bar">
      <button class="media-btn" onclick="document.getElementById('file-input').click()" title="Send bilde/video">📎</button>
      <input type="file" id="file-input" accept="image/*,video/*" style="display:none" onchange="handleFile(event)" />
      <textarea class="msg-input" id="msg-input" placeholder="Skriv en melding..." rows="1"
        onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button class="send-btn" id="send-btn" onclick="sendMessage()">➤</button>
    </div>
  </div>
</div>

<!-- ADD CONTACT MODAL -->
<div class="modal-overlay" id="add-modal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('add-modal')">✕</button>
    <h3>Legg til person</h3>
    <div class="field">
      <label>E-postadresse</label>
      <input type="email" id="add-email" placeholder="venn@eksempel.no" />
    </div>
    <button class="btn-primary" onclick="addContact()">Start samtale</button>
    <div id="add-error" class="auth-error"></div>
  </div>
</div>

<!-- LOGOUT MODAL -->
<div class="modal-overlay" id="logout-modal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('logout-modal')">✕</button>
    <h3>Konto</h3>
    <p id="logout-info" style="color:var(--muted);font-size:0.85rem;margin-bottom:1rem;"></p>
    <button class="btn-primary" onclick="doLogout()"
      style="background:var(--surface2);color:var(--text);border:1px solid var(--border);">Logg ut</button>
  </div>
</div>

<script type="module" src="/src/main.js"></script>
</body>
</html>
