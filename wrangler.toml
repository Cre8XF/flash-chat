name             = "flash-upload"
main             = "worker/upload-worker.js"
compatibility_date = "2024-09-01"

[[r2_buckets]]
binding     = "R2"
bucket_name = "flash-media"

[vars]
# Your Cloudflare account ID (found in the dashboard sidebar)
R2_ACCOUNT_ID  = "your_cloudflare_account_id"
# Must match the bucket_name in [[r2_buckets]] above
R2_BUCKET_NAME = "flash-media"
# Public base URL for your R2 bucket (set up a custom domain or use the r2.dev subdomain)
R2_PUBLIC_URL  = "https://pub-xxxx.r2.dev"
# Lock CORS to your Netlify domain in production
ALLOWED_ORIGIN = "https://your-flash-app.netlify.app"

# Secrets — set these with `wrangler secret put R2_ACCESS_KEY_ID` etc.
# (do NOT put real values here)
# R2_ACCESS_KEY_ID
# R2_SECRET_ACCESS_KEY
